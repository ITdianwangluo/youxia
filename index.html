<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>游侠IT工作室 · 安装包下载管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
            overflow-x: auto;
            padding: 1.8rem 2rem 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1rem;
            background: none;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-top: -0.3rem;
            margin-left: -0.2rem;
            margin-right: -0.2rem;
        }

        .title-section {
            text-align: center;
            margin-bottom: 0;
        }
        .title-section h1 {
            font-size: 43pt;
            font-weight: 700;
            background: linear-gradient(135deg, #1A2A3F, #0F5E9E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-align: center;
        }
        .sub-description {
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            color: #6b6b6b;
            margin-top: 40px;
            margin-bottom: 0;
            letter-spacing: 0.5px;
        }
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .category-wrapper {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            gap: 0.8rem;
            flex-wrap: wrap;
            width: 600px;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c6288;
            border-left: 4px solid #1E88E5;
            padding-left: 1rem;
            letter-spacing: 1px;
            margin: 0;
        }
        .category-add-btn, .category-hide-btn {
            background: #e9ecef;
            border: 1px solid #cbdde9;
            color: #2c6288;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .category-hide-btn {
            background: #ffe8e8;
            border-color: #ffcdc1;
            color: #c25a3a;
            margin-left: 30px;
        }
        .unlocked .category-add-btn, .unlocked .category-hide-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .category-add-btn:hover {
            background: #dee4ec;
            transform: translateY(-1px);
        }
        .category-hide-btn:hover {
            background: #ffd8d0;
        }

        .packages-list {
            display: flex;
            flex-direction: column;
            gap: 66px;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .package-item {
            width: 600px;
            height: 45px;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(to bottom, #1E3A8A, #9333EA) border-box;
            border: 1px solid transparent;
            border-radius: 15px;
            padding: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 0;
            transition: all 0.2s;
        }
        .unlocked .package-item {
            gap: 0;
        }

        .package-item:hover {
            box-shadow: 0 4px 10px rgba(30,136,229,0.15);
            background: linear-gradient(#fefefe, #fefefe) padding-box,
                        linear-gradient(to bottom, #1E3A8A, #9333EA) border-box;
        }

        .item-extra {
            width: 100px;
            flex-shrink: 0;
            height: 100%;
            margin-left: 0;
        }
        .item-extra .pkg-input,
        .item-extra .pkg-input:read-only,
        .item-extra .pkg-input:hover,
        .item-extra .pkg-input:focus,
        .item-extra .pkg-input:read-only:hover,
        .item-extra .pkg-input:read-only:focus {
            background-color: #1e88e5 !important;
            color: white !important;
            border: none;
            border-radius: 15px;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 0.9rem;
            font-size: 0.85rem;
            box-sizing: border-box;
            cursor: default;
            box-shadow: none;
        }
        .item-extra .pkg-input::placeholder {
            color: rgba(255,255,255,0.7);
            text-align: center;
        }

        .item-extra2, .item-name, .item-url {
            display: flex;
            align-items: center;
            height: 100%;
            margin-left: 25px;
        }
        .item-extra2 {
            width: 90px;
            flex-shrink: 0;
        }
        .item-name {
            width: 170px;
            flex-shrink: 0;
        }
        .item-url {
            width: 50px;
            flex-shrink: 0;
        }
        .unlocked .item-url {
            display: flex;
        }
        .item-url {
            display: none;
        }

        .pkg-input {
            width: 100%;
            height: 38px;
            padding: 0 0.9rem;
            border-radius: 0.75rem;
            border: none;
            background: #ffffff;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            line-height: 38px;
            box-sizing: border-box;
        }
        .pkg-input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(30,136,229,0.2);
        }
        .pkg-input:read-only {
            background: #ffffff;
            color: #4b6a88;
            cursor: default;
        }
        .pkg-input:read-only:focus,
        .pkg-input:read-only:hover {
            box-shadow: none;
            background: #ffffff;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
            margin-left: auto;
            height: 100%;
            padding-right: 1rem;
        }

        .btn-download {
            background: #1E88E5;
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 35px;
            height: 35px;
            box-sizing: border-box;
        }
        .btn-download:hover {
            background: #0b5e9e;
        }

        .btn-delete, .btn-hide {
            background: transparent;
            border: 1px solid #ffcdc1;
            color: #c25a3a;
            padding: 0 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: none !important;
            line-height: 30px;
            height: 30px;
            box-sizing: border-box;
        }
        .btn-hide {
            border-color: #cbdde9;
            color: #4a627a;
        }
        .btn-hide:hover {
            background: #eef3fc;
            border-color: #9bb7d0;
        }
        .unlocked .btn-delete, .unlocked .btn-hide {
            display: inline-flex !important;
        }
        .btn-delete:hover {
            background: #ffe1d8;
            border-color: #e69676;
        }

        .empty-category {
            text-align: center;
            padding: 1.5rem;
            background: #fafcff;
            border-radius: 1rem;
            color: #8aaec0;
            font-size: 0.85rem;
            border: 1px dashed #cde3f5;
        }

        .editable-btn {
            display: none !important;
        }
        .unlocked .editable-btn {
            display: inline-flex !important;
        }
        .btn {
            border: none;
            padding: 0.55rem 1.3rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-outline {
            background: white;
            border: 1px solid #cbdde9;
            color: #2c6288;
        }
        .btn-outline:hover {
            background: #f8fafc;
            border-color: #9bb7d0;
        }
        .btn-hidden-manager {
            background: #e9ecef;
            color: #4a627a;
            border: 1px solid #d0dce8;
        }
        .btn-hidden-manager:hover {
            background: #dee4ec;
        }
        .btn-clear-content {
            background: #f0f0f0;
            color: #c25a3a;
            border: 1px solid #ffcdc1;
        }
        .btn-clear-content:hover {
            background: #ffe1d8;
        }
        .btn-clear-links {
            background: #f0f0f0;
            color: #2c6288;
            border: 1px solid #cbdde9;
        }
        .btn-clear-links:hover {
            background: #dee4ec;
        }

        .footer-description {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #6c6f78;
        }

        .permission-btn {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 10px 10px;
            border-color: transparent transparent #1E88E5 transparent;
            background: transparent;
            cursor: pointer;
            z-index: 1001;
            font-size: 0;
            line-height: 0;
            text-indent: -9999px;
        }
        .permission-btn::after {
            content: "·";
            position: absolute;
            bottom: -8px;
            right: -8px;
            font-size: 10px;
            color: white;
            text-indent: 0;
            pointer-events: none;
        }
        .permission-btn:hover {
            border-color: transparent transparent #0b5e9e transparent;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.3s ease;
        }
        .loading-content {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            font-size: 1.2rem;
            font-weight: 500;
            color: #1f6392;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e9ecef;
            border-top-color: #1E88E5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auth-modal, .hidden-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .auth-modal.active, .hidden-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .auth-card, .hidden-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            width: 550px;
            max-width: 90%;
            text-align: center;
        }
        .hidden-card {
            text-align: left;
            max-height: 80vh;
            overflow-y: auto;
        }
        .hidden-card h3 {
            margin-bottom: 1.2rem;
            color: #1f6392;
            text-align: center;
        }
        .section-title-small {
            font-size: 1rem;
            font-weight: 600;
            color: #2c6288;
            margin: 1rem 0 0.5rem 0;
            border-left: 3px solid #1E88E5;
            padding-left: 0.8rem;
        }
        .hidden-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .hidden-item-info {
            flex: 1;
        }
        .hidden-item-name {
            font-weight: 600;
            color: #2c6288;
        }
        .hidden-item-category, .hidden-item-desc {
            font-size: 0.7rem;
            color: #6c8eaa;
        }
        .unhide-btn {
            background: #38bdf8;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .close-hidden-btn {
            margin-top: 1rem;
            background: #e9ecef;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            width: 100%;
        }

        .auth-card input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            outline: none;
        }
        .auth-card input:focus {
            border-color: #38bdf8;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 0.5rem;
        }
        .auth-buttons button {
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-confirm {
            background: #38bdf8;
            color: white;
        }
        .auth-cancel {
            background: #e9ecef;
            color: #4a627a;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        /* ========== 响应式设计：手机等窄屏幕 ========== */
        @media (max-width: 750px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            .header { padding: 0.8rem; gap: 0.5rem; }
            .title-section h1 { font-size: 32pt; }  /* 标题缩小 */
            .sub-description { font-size: 12px; margin-top: 20px; }
            .action-buttons { justify-content: center; gap: 0.5rem; }
            .action-buttons .btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
            
            /* 分类标题区域适配 */
            .category-header { width: 100%; flex-wrap: wrap; justify-content: center; }
            .section-title { font-size: 1.1rem; }
            .category-add-btn, .category-hide-btn { padding: 0.2rem 0.6rem; font-size: 0.7rem; }
            
            /* 卡片框在手机上改为垂直排列，宽度100%并允许滚动查看内容 */
            .packages-list { gap: 30px; }
            .package-item { 
                width: 100%; 
                flex-direction: column; 
                height: auto; 
                padding: 0.5rem; 
                gap: 8px;
            }
            .package-item .item-extra,
            .package-item .item-extra2,
            .package-item .item-name,
            .package-item .item-url {
                width: 100%;
                margin-left: 0;
                height: auto;
            }
            .item-extra .pkg-input { border-radius: 15px; height: 40px; }
            .pkg-input { height: 40px; line-height: 40px; }
            .item-actions { margin-left: 0; justify-content: flex-end; padding-right: 0; margin-top: 5px; }
            .btn-download, .btn-delete, .btn-hide { height: 36px; line-height: 36px; }
            
            /* 权限按钮保持小三角但稍微放大方便点击 */
            .permission-btn { border-width: 0 0 15px 15px; }
            .permission-btn::after { bottom: -12px; right: -12px; font-size: 14px; }
        }
        /* 中等屏幕（平板）适当调整 */
        @media (min-width: 751px) and (max-width: 1024px) {
            .package-item { width: 600px; } /* 保持固定宽度，允许横向滚动 */
            .container { overflow-x: auto; }
        }

        .toast-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e2a36e6;
            backdrop-filter: blur(8px);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="header">
        <div class="title-section">
            <h1>游侠IT工作室</h1>
            <div class="sub-description">———— 终身技术服务   ■   多渠道下载选择   ■   软件资源丰富 ————</div>
        </div>
        <div class="action-buttons">
            <button class="btn btn-outline editable-btn" id="resetDefaultBtn">🔄 重置示例</button>
            <button class="btn btn-hidden-manager editable-btn" id="manageHiddenBtn">📁 隐藏项管理</button>
            <button class="btn btn-clear-content editable-btn" id="clearContentBtn">🗑️ 清空内容</button>
            <button class="btn btn-clear-links editable-btn" id="clearLinksBtn">🔗 清空链接</button>
        </div>
    </div>

    <div id="categoriesContainer"></div>

    <div class="footer-description">
        it游侠工作室，提供最优质的服务，终身技术服务支持。
    </div>
</div>

<button id="permissionToggleBtn" class="permission-btn"></button>

<div id="authModal" class="auth-modal">
    <div class="auth-card">
        <h3>🔐 权限验证</h3>
        <input type="text" id="authUsername" placeholder="账号" autocomplete="off">
        <input type="password" id="authPassword" placeholder="密码">
        <div id="authError" class="error-msg"></div>
        <div class="auth-buttons">
            <button id="authConfirmBtn" class="auth-confirm">确认</button>
            <button id="authCancelBtn" class="auth-cancel">取消</button>
        </div>
    </div>
</div>

<div id="hiddenModal" class="hidden-modal">
    <div class="hidden-card">
        <h3>📁 隐藏项管理</h3>
        <div id="hiddenItemsList"></div>
        <div id="hiddenCategoriesList"></div>
        <button id="closeHiddenModal" class="close-hidden-btn">关闭</button>

</div>

<div id="toastMsg" class="toast-msg"></div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <div>页面加载中，请耐心等待...</div>
    </div>
</div>

<script>
    (function() {
        function hexToString(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            }
            return str;
        }
        const ADMIN_USER_HEX = "61646d696e";
        const ADMIN_PASS_HEX = "666a743133343137363933313730";

        const categoryTemplates = [
            { id: 'cat0', title: 'Adobe 套件' },
            { id: 'cat1', title: 'Microsoft Office 套件' },
            { id: 'cat2', title: 'Windows 系统镜像' },
            { id: 'cat3', title: 'AutoCAD' },
            { id: 'cat4', title: '条码打印软件' }
        ];

        let categories = [];
        let nextItemId = 1;
        let isUnlocked = false;

        const JSONBIN_API_KEY = "$2a$10$d8Wh7LFKYdzR9v/9BRiX3OI5Wex3ZHvpih3ySS4pAUesYeXZMI4Tq";
        const JSONBIN_BIN_ID = "69dbd856856a682189277538";
        let useCloud = !!(JSONBIN_API_KEY && JSONBIN_BIN_ID && JSONBIN_API_KEY !== "" && JSONBIN_BIN_ID !== "");

        const categoriesContainer = document.getElementById('categoriesContainer');
        const resetBtn = document.getElementById('resetDefaultBtn');
        const manageHiddenBtn = document.getElementById('manageHiddenBtn');
        const clearContentBtn = document.getElementById('clearContentBtn');
        const clearLinksBtn = document.getElementById('clearLinksBtn');
        const toastEl = document.getElementById('toastMsg');
        const permissionBtn = document.getElementById('permissionToggleBtn');
        const authModal = document.getElementById('authModal');
        const authUsername = document.getElementById('authUsername');
        const authPassword = document.getElementById('authPassword');
        const authError = document.getElementById('authError');
        const authConfirm = document.getElementById('authConfirmBtn');
        const authCancel = document.getElementById('authCancelBtn');
        const hiddenModal = document.getElementById('hiddenModal');
        const hiddenItemsList = document.getElementById('hiddenItemsList');
        const hiddenCategoriesList = document.getElementById('hiddenCategoriesList');
        const closeHiddenModalBtn = document.getElementById('closeHiddenModal');
        const appContainer = document.getElementById('appContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function showMessage(text, duration = 2000) {
            toastEl.textContent = text;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        function hideLoading() {
            if (loadingOverlay) {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 300);
            }
        }

        function normalizeUrl(rawUrl) {
            if (!rawUrl) return '';
            let trimmed = rawUrl.trim();
            if (trimmed === '') return '';
            if (!/^(https?:\/\/)/i.test(trimmed) && !trimmed.startsWith('//')) {
                if (trimmed.includes('://')) return trimmed;
                return 'https://' + trimmed;
            }
            return trimmed;
        }

        function startDownload(urlRaw) {
            if (!urlRaw || urlRaw.trim() === '') {
                showMessage('❌ 下载链接为空，请填写有效地址', 1800);
                return false;
            }
            let finalUrl = normalizeUrl(urlRaw);
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://') && !finalUrl.startsWith('//')) {
                showMessage('⚠️ 链接格式无效，请使用 http:// 或 https:// 开头', 2000);
                return false;
            }
            if (finalUrl.toLowerCase().startsWith('javascript:')) {
                showMessage('🚫 禁止使用 javascript: 伪协议', 1800);
                return false;
            }
            try {
                const newWindow = window.open(finalUrl, '_blank');
                if (!newWindow) {
                    if (confirm('浏览器可能阻止了新窗口，是否在当前页面跳转下载？\n链接：' + finalUrl)) {
                        window.location.href = finalUrl;
                    }
                } else {
                    showMessage(`⬇️ 开始下载: ${finalUrl.substring(0, 60)}${finalUrl.length > 60 ? '...' : ''}`, 1500);
                }
            } catch (err) {
                showMessage('下载失败，请检查链接或网络', 2000);
            }
            return true;
        }

        async function saveData() {
            const dataToSave = {
                categories: categories.map(cat => ({
                    id: cat.id,
                    title: cat.title,
                    hidden: cat.hidden,
                    items: cat.items.map(item => ({
                        id: item.id,
                        extra: item.extra || '',
                        extra2: item.extra2 || '',
                        name: item.name,
                        url: item.url,
                        hidden: item.hidden
                    }))
                })),
                nextItemId: nextItemId
            };
            if (useCloud) {
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': JSONBIN_API_KEY
                        },
                        body: JSON.stringify(dataToSave)
                    });
                } catch (err) { console.error(err); showMessage('⚠️ 云端同步失败', 2000); }
            } else {
                localStorage.setItem('packageManagerData', JSON.stringify(dataToSave));
            }
        }

        async function loadData() {
            if (useCloud) {
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_API_KEY }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        const record = data.record;
                        if (record && record.categories && record.categories.length === categoryTemplates.length) {
                            categories = record.categories.map(cat => ({
                                id: cat.id,
                                title: cat.title,
                                hidden: cat.hidden === true,
                                items: cat.items.map(item => ({
                                    id: item.id,
                                    extra: item.extra || '',
                                    extra2: item.extra2 || '',
                                    name: item.name || '',
                                    url: item.url || '',
                                    hidden: item.hidden === true
                                }))
                            }));
                            nextItemId = record.nextItemId || 1;
                            let maxId = 0;
                            categories.forEach(cat => cat.items.forEach(item => { if (item.id > maxId) maxId = item.id; }));
                            if (nextItemId <= maxId) nextItemId = maxId + 1;
                            return true;
                        }
                    }
                } catch (err) { console.error(err); }
            }
            const localRaw = localStorage.getItem('packageManagerData');
            if (localRaw) {
                try {
                    const data = JSON.parse(localRaw);
                    if (data.categories && data.categories.length === categoryTemplates.length) {
                        categories = data.categories.map(cat => ({
                            ...cat,
                            hidden: cat.hidden === true,
                            items: cat.items.map(i => ({
                                ...i,
                                extra: i.extra || '',
                                extra2: i.extra2 || '',
                                hidden: i.hidden === true
                            }))
                        }));
                        nextItemId = data.nextItemId || 1;
                        let maxId = 0;
                        categories.forEach(cat => cat.items.forEach(item => { if (item.id > maxId) maxId = item.id; }));
                        if (nextItemId <= maxId) nextItemId = maxId + 1;
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        async function resetToDefault() {
            if (!isUnlocked) return;
            categories = categoryTemplates.map(template => ({
                id: template.id,
                title: template.title,
                hidden: false,
                items: []
            }));
            const psCategory = categories.find(c => c.id === 'cat0');
            if (psCategory) {
                psCategory.items.push(
                    { id: nextItemId++, extra: '', extra2: '', name: '', url: '', hidden: false },
                    { id: nextItemId++, extra: '', extra2: '', name: '', url: '', hidden: false }
                );
            }
            const examples = [
                { catId: 'cat1', items: [
                    { extra: '', extra2: '', name: '', url: '' },
                    { extra: '', extra2: '', name: '', url: '' }
                ]},
                { catId: 'cat2', items: [
                    { extra: '', extra2: '', name: '', url: '' },
                    { extra: '', extra2: '', name: '', url: '' }
                ]},
                { catId: 'cat3', items: [
                    { extra: '', extra2: '', name: '', url: '' },
                    { extra: '', extra2: '', name: '', url: '' }
                ]},
                { catId: 'cat4', items: [
                    { extra: '', extra2: '', name: '', url: '' },
                    { extra: '', extra2: '', name: '', url: '' }
                ]}
            ];
            examples.forEach(ex => {
                const cat = categories.find(c => c.id === ex.catId);
                if (cat) {
                    ex.items.forEach(exItem => {
                        cat.items.push({ id: nextItemId++, extra: exItem.extra || '', extra2: exItem.extra2 || '', name: exItem.name, url: exItem.url, hidden: false });
                    });
                }
            });
            renderAllCategories();
            await saveData();
            showMessage('已重置为示例下载链接（链接为空）', 2000);
        }

        async function clearAllContent() {
            if (!isUnlocked) {
                showMessage('⛔ 暂无修改权限，请先解锁编辑', 1500);
                return;
            }
            for (let cat of categories) {
                for (let item of cat.items) {
                    item.extra = '';
                    item.extra2 = '';
                    item.name = '';
                    item.url = '';
                }
            }
            renderAllCategories();
            await saveData();
            showMessage('已清空所有卡片框内的内容', 1500);
        }

        async function clearAllLinks() {
            if (!isUnlocked) {
                showMessage('⛔ 暂无修改权限，请先解锁编辑', 1500);
                return;
            }
            for (let cat of categories) {
                for (let item of cat.items) {
                    item.url = '';
                }
            }
            renderAllCategories();
            await saveData();
            showMessage('已清空所有卡片框内的下载链接', 1500);
        }

        function createPackageItemDOM(item, categoryId) {
            const div = document.createElement('div');
            div.className = 'package-item';
            div.dataset.id = item.id;

            const extraDiv = document.createElement('div');
            extraDiv.className = 'item-extra';
            const extraInput = document.createElement('input');
            extraInput.type = 'text';
            extraInput.className = 'pkg-input';
            extraInput.placeholder = '附加信息';
            extraInput.value = item.extra || '';
            if (!isUnlocked) extraInput.setAttribute('readonly', 'readonly');
            extraDiv.appendChild(extraInput);

            const extra2Div = document.createElement('div');
            extra2Div.className = 'item-extra2';
            const extra2Input = document.createElement('input');
            extra2Input.type = 'text';
            extra2Input.className = 'pkg-input';
            extra2Input.placeholder = '版本/备注';
            extra2Input.value = item.extra2 || '';
            extra2Div.appendChild(extra2Input);

            const nameDiv = document.createElement('div');
            nameDiv.className = 'item-name';
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'pkg-input';
            nameInput.placeholder = '软件名称';
            nameInput.value = item.name;
            nameDiv.appendChild(nameInput);

            const urlDiv = document.createElement('div');
            urlDiv.className = 'item-url';
            const urlInput = document.createElement('input');
            urlInput.type = 'text';
            urlInput.className = 'pkg-input';
            urlInput.placeholder = '下载链接';
            urlInput.value = item.url;
            urlDiv.appendChild(urlInput);

            const hiddenUrl = document.createElement('input');
            hiddenUrl.type = 'hidden';
            hiddenUrl.value = item.url;

            extraInput.addEventListener('input', () => {
                if (isUnlocked) { item.extra = extraInput.value; saveData(); }
            });
            extra2Input.addEventListener('input', () => {
                if (isUnlocked) { item.extra2 = extra2Input.value; saveData(); }
            });
            nameInput.addEventListener('input', () => {
                if (isUnlocked) { item.name = nameInput.value; saveData(); }
            });
            urlInput.addEventListener('input', () => {
                if (isUnlocked) { item.url = urlInput.value; hiddenUrl.value = urlInput.value; saveData(); }
            });

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'item-actions';
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.innerHTML = '下载';
            downloadBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                startDownload(hiddenUrl.value);
            });
            const hideBtn = document.createElement('button');
            hideBtn.className = 'btn-hide';
            hideBtn.innerHTML = '👁️ 隐藏';
            hideBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isUnlocked) return;
                item.hidden = true;
                renderAllCategories();
                saveData();
                showMessage(`已隐藏“${item.name || '未命名'}”`, 1200);
            });
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = '🗑️ 删除';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isUnlocked) return;
                const cat = categories.find(c => c.id === categoryId);
                if (cat) {
                    const idx = cat.items.findIndex(i => i.id === item.id);
                    if (idx !== -1) cat.items.splice(idx, 1);
                    renderAllCategories();
                    saveData();
                    showMessage('已永久删除该项', 1000);
                }
            });
            actionsDiv.appendChild(downloadBtn);
            actionsDiv.appendChild(hideBtn);
            actionsDiv.appendChild(deleteBtn);
            div.appendChild(extraDiv);
            div.appendChild(extra2Div);
            div.appendChild(nameDiv);
            div.appendChild(urlDiv);
            div.appendChild(hiddenUrl);
            div.appendChild(actionsDiv);
            return div;
        }

        function renderCategory(category) {
            if (category.hidden) return null;
            const wrapper = document.createElement('div');
            wrapper.className = 'category-wrapper';
            const header = document.createElement('div');
            header.className = 'category-header';
            const title = document.createElement('div');
            title.className = 'section-title';
            title.textContent = category.title;
            const addBtn = document.createElement('button');
            addBtn.className = 'category-add-btn';
            addBtn.innerHTML = '➕ 添加';
            addBtn.addEventListener('click', () => {
                if (!isUnlocked) return;
                const newId = nextItemId++;
                category.items.push({ id: newId, extra: '', extra2: '', name: '', url: '', hidden: false });
                renderAllCategories();
                saveData();
                showMessage(`已在“${category.title}”中添加新下载项`, 1200);
            });
            const hideCategoryBtn = document.createElement('button');
            hideCategoryBtn.className = 'category-hide-btn';
            hideCategoryBtn.innerHTML = '👁️‍🗨️ 隐藏分类';
            hideCategoryBtn.addEventListener('click', () => {
                if (!isUnlocked) return;
                category.hidden = true;
                renderAllCategories();
                saveData();
                showMessage(`已隐藏分类“${category.title}”`, 1200);
            });
            header.appendChild(title);
            header.appendChild(addBtn);
            header.appendChild(hideCategoryBtn);
            const itemsContainer = document.createElement('div');
            itemsContainer.className = 'packages-list';
            const visibleItems = category.items.filter(item => !item.hidden);
            if (visibleItems.length === 0) {
                const emptyHint = document.createElement('div');
                emptyHint.className = 'empty-category';
                emptyHint.textContent = '暂无下载链接，点击上方“➕ 添加”按钮新增';
                itemsContainer.appendChild(emptyHint);
            } else {
                visibleItems.forEach(item => itemsContainer.appendChild(createPackageItemDOM(item, category.id)));
            }
            wrapper.appendChild(header);
            wrapper.appendChild(itemsContainer);
            return wrapper;
        }

        function renderAllCategories() {
            categoriesContainer.innerHTML = '';
            categories.forEach(cat => {
                const catElem = renderCategory(cat);
                if (catElem) categoriesContainer.appendChild(catElem);
            });
            applyPermissionStateToInputs();
        }

        function applyPermissionStateToInputs() {
            const allExtra2Inputs = document.querySelectorAll('.item-extra2 .pkg-input');
            const allNameInputs = document.querySelectorAll('.item-name .pkg-input');
            const allUrlInputs = document.querySelectorAll('.item-url .pkg-input');
            [...allExtra2Inputs, ...allNameInputs, ...allUrlInputs].forEach(input => {
                if (isUnlocked) input.removeAttribute('readonly');
                else input.setAttribute('readonly', 'readonly');
            });
            if (isUnlocked) {
                appContainer.classList.add('unlocked');
            } else {
                appContainer.classList.remove('unlocked');
            }
        }

        function showHiddenManager() {
            if (!isUnlocked) return;
            const allHidden = [];
            categories.forEach(cat => cat.items.forEach(item => { if (item.hidden) allHidden.push({ ...item, categoryTitle: cat.title }); }));
            const hiddenCategories = categories.filter(cat => cat.hidden === true);
            hiddenItemsList.innerHTML = '';
            if (allHidden.length === 0) hiddenItemsList.innerHTML = '<div style="text-align:center; color:#6c8eaa;">暂无隐藏的下载链接</div>';
            else {
                hiddenItemsList.innerHTML = '<div class="section-title-small">📄 隐藏的下载链接</div>';
                allHidden.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'hidden-item';
                    div.innerHTML = `<div class="hidden-item-info"><div class="hidden-item-name">${escapeHtml(item.name) || '未命名'}</div><div class="hidden-item-category">分类：${escapeHtml(item.categoryTitle)}</div><div class="hidden-item-url">${escapeHtml(item.url) || '无链接'}</div></div><button class="unhide-btn" data-id="${item.id}" data-type="item" data-cat="${escapeHtml(item.categoryTitle)}">恢复显示</button>`;
                    hiddenItemsList.appendChild(div);
                });
            }
            hiddenCategoriesList.innerHTML = '';
            if (hiddenCategories.length === 0) hiddenCategoriesList.innerHTML = '<div style="text-align:center; color:#6c8eaa; margin-top:1rem;">暂无隐藏的分类</div>';
            else {
                hiddenCategoriesList.innerHTML = '<div class="section-title-small">🗂️ 隐藏的分类</div>';
                hiddenCategories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'hidden-item';
                    div.innerHTML = `<div class="hidden-item-info"><div class="hidden-item-name">${escapeHtml(cat.title)}</div><div class="hidden-item-desc">该分类下共有 ${cat.items.length} 个下载项（含隐藏项）</div></div><button class="unhide-btn" data-id="${cat.id}" data-type="category">恢复显示</button>`;
                    hiddenCategoriesList.appendChild(div);
                });
            }
            document.querySelectorAll('#hiddenItemsList .unhide-btn, #hiddenCategoriesList .unhide-btn').forEach(btn => {
                btn.removeEventListener('click', handleUnhide);
                btn.addEventListener('click', handleUnhide);
            });
            hiddenModal.classList.add('active');
        }

        async function handleUnhide(e) {
            const btn = e.currentTarget;
            const type = btn.dataset.type;
            const id = btn.dataset.id;
            if (type === 'item') {
                const catTitle = btn.dataset.cat;
                const targetCat = categories.find(c => c.title === catTitle);
                if (targetCat) {
                    const targetItem = targetCat.items.find(i => i.id === parseInt(id));
                    if (targetItem) {
                        targetItem.hidden = false;
                        renderAllCategories();
                        await saveData();
                        showMessage(`已恢复显示“${targetItem.name || '未命名'}”`, 1200);
                        showHiddenManager();
                    }
                }
            } else if (type === 'category') {
                const targetCat = categories.find(c => c.id === id);
                if (targetCat) {
                    targetCat.hidden = false;
                    renderAllCategories();
                    await saveData();
                    showMessage(`已恢复显示分类“${targetCat.title}”`, 1200);
                    showHiddenManager();
                }
            }
        }

        function closeHiddenModal() { hiddenModal.classList.remove('active'); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        function showAuthModal() { authUsername.value = ''; authPassword.value = ''; authError.innerText = ''; authModal.classList.add('active'); }
        function hideAuthModal() { authModal.classList.remove('active'); }
        function attemptAuth() {
            const inputUser = authUsername.value.trim();
            const inputPass = authPassword.value.trim();
            const validUser = hexToString(ADMIN_USER_HEX);
            const validPass = hexToString(ADMIN_PASS_HEX);
            if (inputUser === validUser && inputPass === validPass) {
                isUnlocked = true;
                applyPermissionStateToInputs();
                hideAuthModal();
                showMessage('✅ 权限验证通过，现在可以编辑所有下载信息', 2000);
            } else {
                authError.innerText = '账号或密码错误，请重试';
                authPassword.value = '';
                authPassword.focus();
            }
        }
        function lockEditor() {
            if (isUnlocked) {
                isUnlocked = false;
                applyPermissionStateToInputs();
                showMessage('🔒 编辑已锁定，页面信息只读', 1500);
            } else {
                showAuthModal();
            }
        }

        permissionBtn.addEventListener('click', () => {
            if (isUnlocked) lockEditor();
            else showAuthModal();
        });
        resetBtn.addEventListener('click', resetToDefault);
        manageHiddenBtn.addEventListener('click', showHiddenManager);
        clearContentBtn.addEventListener('click', clearAllContent);
        clearLinksBtn.addEventListener('click', clearAllLinks);
        authConfirm.addEventListener('click', attemptAuth);
        authCancel.addEventListener('click', hideAuthModal);
        authModal.addEventListener('click', (e) => { if (e.target === authModal) hideAuthModal(); });
        closeHiddenModalBtn.addEventListener('click', closeHiddenModal);
        hiddenModal.addEventListener('click', (e) => { if (e.target === hiddenModal) closeHiddenModal(); });
        [authUsername, authPassword].forEach(inp => inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptAuth(); }));

        function handleUrlEnterDownload(e) {
            if (e.key === 'Enter') {
                const target = e.target;
                if (target.classList?.contains('pkg-input') && target.closest('.item-url')) {
                    e.preventDefault();
                    target.closest('.package-item')?.querySelector('.btn-download')?.click();
                }
            }
        }
        document.addEventListener('keypress', handleUrlEnterDownload);

        async function init() {
            const loaded = await loadData();
            if (!loaded) {
                categories = categoryTemplates.map(template => ({ id: template.id, title: template.title, hidden: false, items: [] }));
                nextItemId = 1;
                await resetToDefault();
            } else {
                renderAllCategories();
            }
            hideLoading();
            showMessage('加载中请稍后', 2000);
        }
        init();
    })();
</script>
</body>
</html>
